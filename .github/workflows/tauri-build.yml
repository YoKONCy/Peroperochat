name: Tauri Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26c

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Initialize Android (if missing)
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "Initializing Android project..."
            pnpm tauri android init --ci
          fi
        env:
          CI: true

      - name: Build Android APK (aarch64 only)
        run: pnpm tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          OPENSSL_DIR: /usr/lib/ssl

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Sign APK with debug key
        run: |
          cd src-tauri/gen/android
          ./gradlew signingReport || true
          cd app/build/outputs/apk/universal/release
          $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -v 4 app-universal-release-unsigned.apk app-aligned.apk
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android --out PeroperoChat-v1.2.2-arm64.apk app-aligned.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PeroperoChat-android-arm64
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/PeroperoChat-v1.2.2-arm64.apk
