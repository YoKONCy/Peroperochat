name: Tauri Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26c

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Initialize Android project
        run: pnpm tauri android init --ci
        env:
          CI: true

      - name: Build Android APK (aarch64 only, split per ABI)
        run: pnpm tauri android build --apk --split-per-abi --target aarch64
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          OPENSSL_DIR: /usr/lib/ssl

      - name: Find and rename APK
        run: |
          APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*aarch64*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" PeroperoChat-v1.2.2-arm64.apk
            echo "APK found: $APK_PATH"
          else
            echo "APK not found!"
            find src-tauri/gen/android -name "*.apk" || true
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PeroperoChat-android-arm64
          path: PeroperoChat-v1.2.2-arm64.apk
